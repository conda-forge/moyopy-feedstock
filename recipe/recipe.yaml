schema_version: 1

context:
  version: "0.15.0"

package:
  name: moyopy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/moyopy/moyopy-${{ version }}.tar.gz
  sha256: 8c1eb9decdc366f8b85a5ba5b04187bf81b0c6092b7b2bc01c19ab79134feeea

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - maturin >=1.0,<2.0
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1,<2
    - pip
  run:
    - python
    - typing_extensions

tests:
  - python:
      imports:
        - moyopy
      pip_check: true

about:
  summary: Python binding of Moyo
  license: MIT
  license_file: LICENSE-MIT
  homepage: https://github.com/spglib/moyo

extra:
  recipe-maintainers:
    - ocefpaf
